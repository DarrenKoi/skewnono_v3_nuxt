[uwsgi]
; --- Application entry ---------------------------------------------------
; Root index.py exposes `application = create_app()` by importing the
; Flask factory from the `back_dev_home.app` namespace package.
chdir           = %c
module          = index
callable        = application

; --- Process model -------------------------------------------------------
master          = true
processes       = 4
threads         = 2
enable-threads  = true
lazy-apps       = true

; --- Networking ----------------------------------------------------------
; Standalone HTTP (matches Phase 1/2: Flask on localhost:5000).
http-socket     = 0.0.0.0:5000

; For Phase 3 behind nginx, comment out http-socket above and use a
; unix socket or the native uwsgi protocol instead:
; socket        = /tmp/skewnono.sock
; chmod-socket  = 660
; vacuum        = true

; --- Lifecycle -----------------------------------------------------------
die-on-term     = true
need-app        = true
single-interpreter = true

; --- Logging -------------------------------------------------------------
log-date        = true
disable-logging = false
log-4xx         = true
log-5xx         = true

; --- Buffers / limits ----------------------------------------------------
buffer-size     = 32768
post-buffering  = 8192
harakiri        = 60
max-requests    = 1000
